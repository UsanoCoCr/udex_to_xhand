udcap:
  host: "0.0.0.0"
  port: 9000
  timeout_ms: 200
  startup_timeout_s: 10    # M6: abort if no calibrated UDP frame within N seconds

xhand:
  protocol: "RS485"
  # M7 rev2 (ADR-039 + ADR-042): two-port split topology. Each XHand sits
  # on its own USB CDC-ACM device on PC2 (NOT RS485 multi-drop). Last
  # observed mapping (2026-05-19, after USB renumber): Left=/dev/ttyACM2,
  # Right=/dev/ttyACM0. The morning probe had Right on ACM1; enumeration
  # drifted within hours of plan-write. Re-probe + update on every reboot
  # or USB replug per plan rev2 §10.2.3 / ADR-042.
  left_serial_port:  "/dev/ttyACM2"
  right_serial_port: "/dev/ttyACM0"
  baud_rate: 3000000
  control_mode: 3          # 0=passive, 3=position, 5=force
  default_kp: 100
  default_ki: 0
  default_kd: 0
  default_tor_max: 300
  update_rate_hz: 100

# Per-joint mapping: UDCAP 23 → XHand 12
# Source: official UDCAP JSON SDK docs (distal→proximal ordering per finger)
# sources: UDCAP parameter indices to combine
# weights: weight per source (must sum to ~1.0)
# sign: multiplier to handle sign convention (UDCAP negative=flexion, XHand positive=flexion)
# offset: degrees, added after weighted sum
# clamp: [min_deg, max_deg] before deg→rad conversion
#
# M8 (Step A.0): optional per-joint fields `input_range` + `output_range`
# (both-or-none) enable an affine rescale between weighted-sum+sign+offset
# and clamp+deg→rad. Only applied when mapping.use_new_retarget == true.
#
# UDCAP layout (official, DIP→PIP→MCP per finger):
#   Thumb:  l0=DIP, l1=PIP, l2=MCP Pitch, l3=MCP Yaw, l20=MCP Roll
#   Index:  l4=DIP, l5=PIP, l6=MCP Pitch, l7=MCP Yaw, l21=MCP Roll
#   Middle: l8=DIP, l9=PIP, l10=MCP Pitch, l11=MCP Yaw
#   Ring:   l12=DIP, l13=PIP, l14=MCP Pitch, l15=MCP Yaw
#   Pinky:  l16=DIP, l17=PIP, l18=MCP Pitch, l19=MCP Yaw, l22=MCP Roll
#   l23=gesture flag (-1), l24-l27=IMU quaternion
#
# Discarded (no XHand DOF): l11 (mid yaw), l15 (ring yaw), l19 (pinky yaw),
#                            l21 (index roll), l22 (pinky roll), l23 (gesture)
mapping:
  # M8 retarget master switch (required; M8a Step A.0). false = M7 baseline
  # mapping; true = M8 four-finger affine rescale + thumb retargeting.
  #
  # 2026-05-21 M8b first round (commit 8262593) was intentionally conservative
  # per operator cap "几度到十几度": four-finger output_range[1] = 92/100/85/92
  # (10°–25° below clamp), thumb_rota2 output_range = [15, 50]. PC2 visual
  # verify (2026-05-25) found four fingers still don't reach palm closure and
  # thumb remained on the outside of the four fingers. Operator: "你一开始的
  # 修改可能是对的，我也许太谨慎了" → restore the original plan §25 +
  # path-A-runbook proposal, still expressed within the affine-only mechanism
  # so scripts/verify_flag_false_byte_identical.sh keeps passing.
  #
  # 2026-05-25 round 2 (commit 472da5a) restored plan §25 values: four-finger
  # output_range[1] = 110 (= clamp = physical limit at the time) and
  # thumb_rota2 output_range = [30, 50]. PC2 visual verify after round 2
  # still showed (a) four fingers not closing far enough — "再增加一点点"
  # — and (b) thumb "非常明显" still on the outside of the four fingers.
  #
  # 2026-05-25 round 3 (this commit) — URDF-grounded diagnostic flip:
  #   The operator hypothesized clamp was the bottleneck. URDF lookup
  #   (URDF/XHAND 1/XHAND1_URDF_ver 1.3/xhand1_*/urdf/) inverted that:
  #     - Four-finger joint1/joint2 mechanical upper = 109.95° → current
  #       clamp [0, 110] is ALREADY AT THE MECHANICAL CEILING. Raising it
  #       would crash the joint-limit hard stop, not gain closure. The
  #       real bottleneck is input_range[1] being too high: M8a calibration
  #       captured UDCAP max = 80°/92° per joint, so a "normal" fist that
  #       only reaches UDCAP 65°–75° maps to ~80%–90% of clamp, not 100%.
  #     - thumb_rota2 mechanical upper = 89.95° → round-2 clamp [0, 50]
  #       only used 56% of physical range. The original path-A-runbook
  #       §213 proposal (clamp [0, 90] + offset 15 + output_range [0, 90])
  #       was URDF-correct; rounds 1+2 stayed inside [0, 50] purely to
  #       preserve the flag=false guard. Round 3 lifts the clamp.
  #
  #   Changes:
  #     - 8x four-finger joint1: input_range[1] 80→72 (pinky 75.20→68).
  #       Same sensitivity logic for joint2: 92→82 (pinky 85.30→77).
  #       Effect: ~10% smaller UDCAP input now saturates clamp[1]=110, so
  #       a less-than-maximal fist reaches full XHand closure.
  #     - thumb_rota2 (L+R): clamp [0, 50] → [0, 90], output_range [30, 50]
  #       → [40, 90]. At UDCAP l20=0 the XHand thumb sits ~41.2° toward
  #       palm (was ~30.5° in round 2); at max UDCAP opposition the thumb
  #       reaches 90° = full mechanical opposition (was 50°). Matches the
  #       path-A-runbook §213 intent of clamp [0, 90] but expressed as a
  #       pure affine remap (offset stays 0) for arithmetic simplicity.
  #
  #   Flag=false guard impact: example.json l20 = -0.6 (left) / 1.2
  #   (right). Both lie INSIDE both the old [0, 50] and new [0, 90] clamp
  #   bands, so flag=false output for thumb_rota2 is byte-identical (the
  #   raised ceiling is never hit by the test fixture). Four-finger
  #   input_range changes don't touch flag=false at all (input/output_range
  #   are reset when use_new_retarget=false).
  #   verify_flag_false_byte_identical.sh re-run after this edit → passes.
  #
  #   thumb_bend + thumb_rota1 still untouched. If round 3 visual verify
  #   still shows poor pinch / thumb misalignment, the next axis to tune
  #   is thumb_bend (URDF upper = 104.97°, plenty of room).
  use_new_retarget: true
  left:
    thumb_bend:    { sources: [0, 1, 2], weights: [0.3, 0.3, 0.4], sign: -1, offset: 0, clamp: [-10, 110] }
    thumb_rota1:   { sources: [3],       weights: [1.0],            sign: -1, offset: 0, clamp: [-10, 110] }
    thumb_rota2:   { sources: [20],      weights: [1.0],            sign:  1, offset: 0, clamp: [0, 90],
                     input_range: [-1.00, 41.00], output_range: [40, 90] }
    index_bend:    { sources: [7],       weights: [1.0],            sign: -1, offset: 0, clamp: [-10, 30] }
    index_joint1:  { sources: [6],       weights: [1.0],            sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 72.00], output_range: [0, 110] }
    index_joint2:  { sources: [5, 4],    weights: [0.6, 0.4],       sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 82.00], output_range: [0, 110] }
    mid_joint1:    { sources: [10],      weights: [1.0],            sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 72.00], output_range: [0, 110] }
    mid_joint2:    { sources: [9, 8],    weights: [0.6, 0.4],       sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 82.00], output_range: [0, 110] }
    ring_joint1:   { sources: [14],      weights: [1.0],            sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.60, 72.00], output_range: [0, 110] }
    ring_joint2:   { sources: [13, 12],  weights: [0.6, 0.4],       sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 82.00], output_range: [0, 110] }
    pinky_joint1:  { sources: [18],      weights: [1.0],            sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 68.00], output_range: [0, 110] }
    pinky_joint2:  { sources: [17, 16],  weights: [0.6, 0.4],       sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 77.00], output_range: [0, 110] }
  right:
    thumb_bend:    { sources: [0, 1, 2], weights: [0.3, 0.3, 0.4], sign: -1, offset: 0, clamp: [-10, 110] }
    thumb_rota1:   { sources: [3],       weights: [1.0],            sign: -1, offset: 0, clamp: [-10, 110] }
    thumb_rota2:   { sources: [20],      weights: [1.0],            sign:  1, offset: 0, clamp: [0, 90],
                     input_range: [-1.00, 41.00], output_range: [40, 90] }
    index_bend:    { sources: [7],       weights: [1.0],            sign: -1, offset: 0, clamp: [-10, 30] }
    index_joint1:  { sources: [6],       weights: [1.0],            sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 72.00], output_range: [0, 110] }
    index_joint2:  { sources: [5, 4],    weights: [0.6, 0.4],       sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 82.00], output_range: [0, 110] }
    mid_joint1:    { sources: [10],      weights: [1.0],            sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 72.00], output_range: [0, 110] }
    mid_joint2:    { sources: [9, 8],    weights: [0.6, 0.4],       sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 82.00], output_range: [0, 110] }
    ring_joint1:   { sources: [14],      weights: [1.0],            sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 72.00], output_range: [0, 110] }
    ring_joint2:   { sources: [13, 12],  weights: [0.6, 0.4],       sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 82.00], output_range: [0, 110] }
    pinky_joint1:  { sources: [18],      weights: [1.0],            sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 68.00], output_range: [0, 110] }
    pinky_joint2:  { sources: [17, 16],  weights: [0.6, 0.4],       sign: -1, offset: 0, clamp: [0, 110],
                     input_range: [0.00, 77.00], output_range: [0, 110] }
